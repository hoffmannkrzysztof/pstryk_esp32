[platformio]
boards_dir = board

[env:tdisplay_long]
platform = espressif32
board = T-Display-Long
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
board_build.partitions = huge_app.csv
board_build.arduino.memory_type = qio_opi
board_build.memory_type = qio_opi
build_flags =
    -std=gnu++17
    -I src
    -DCORE_DEBUG_LEVEL=3
    -DBOARD_HAS_PSRAM
build_src_filter =
    +<*>
    -<render/EpdRenderer.cpp>
    -<render/EpdDashboard.cpp>
    -<app/SleepCycle.cpp>
lib_ignore = EPD47
lib_deps =
    moononournation/GFX Library for Arduino@^1.3.7
    tzapu/WiFiManager@^2.0.17
    bblanchon/ArduinoJson@^7.2.0

[env:native]
platform = native
test_framework = unity
build_src_filter = +<core/> +<view/>
test_build_src = yes
build_flags =
    -std=gnu++17
    -I src
    -DPSTRYK_NATIVE
lib_deps =
    bblanchon/ArduinoJson@^7.2.0

[env:t5_epaper_s3]
platform = espressif32
board = T5-ePaper-S3
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
board_build.partitions = default_16MB.csv
board_build.arduino.memory_type = qio_opi
board_build.memory_type = qio_opi
build_flags =
    -std=gnu++17
    -I src
    -DCORE_DEBUG_LEVEL=3
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DLILYGO_T5_EPD47_S3
    -DPSTRYK_BOARD_EPAPER
    ; Vendored LilyGo-EPD47 .c sources gate their RMT/I2S header includes on
    ; ESP_IDF_VERSION_MAJOR at the very top of the file, but never include
    ; esp_idf_version.h first (upstream packaging defect). Force-include it so
    ; the IDF-5 code paths pick the new driver/rmt_tx.h headers. Idempotent and
    ; harmless for our own sources.
    -include esp_idf_version.h
build_src_filter =
    +<*>
    -<render/LongRenderer.cpp>
    -<app/App.cpp>
lib_deps =
    bblanchon/ArduinoJson@^7.2.0
    tzapu/WiFiManager@^2.0.17
